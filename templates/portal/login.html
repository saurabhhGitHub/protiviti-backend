<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protiviti Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow border border-slate-100 w-full max-w-sm">
        <h2 class="text-3xl font-bold mb-6 text-slate-800 text-center tracking-tight">Login</h2>
        <div id="error-message" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 text-sm" role="alert"></div>
        <form id="login-form">
            <div class="mb-5">
                <label class="block text-slate-700 text-sm font-semibold mb-2" for="email">Email address</label>
                <input class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 transition-colors" id="email" type="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-slate-700 text-sm font-semibold mb-2" for="password">Password</label>
                <input class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 transition-colors" id="password" type="password" placeholder="••••••••" required>
            </div>
            <div>
                <button class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors cursor-pointer" type="submit">Sign in</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.classList.add('hidden');
            errorDiv.innerText = '';

            try {
                const response = await fetch('/portal/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('api_key', data.api_key);
                    localStorage.setItem('sf_user_id', data.user.sf_user_id);
                    window.location.href = '/portal/dashboard/';
                } else {
                    errorDiv.innerText = data.message || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'Network error occurred';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
